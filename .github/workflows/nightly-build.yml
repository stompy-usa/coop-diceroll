name: Nightly Steam DB Build

on:
  schedule:
    - cron: '0 3 * * *'  # 3:00 AM UTC every night
  workflow_dispatch:       # allows manual trigger from GitHub Actions tab

jobs:
  build-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DB builder
        run: python build_steam_db.py --output steam_coop_db.json

      - name: Commit updated database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add steam_coop_db.json
          git diff --cached --quiet || git commit -m "chore: nightly DB update $(date -u '+%Y-%m-%d')"
          git push
